services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: mcp_gateway
      MYSQL_USER: mcp_gateway
      MYSQL_PASSWORD: mcp_gateway
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - mcp-gateway-mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  mcp-gateway-mysql:

