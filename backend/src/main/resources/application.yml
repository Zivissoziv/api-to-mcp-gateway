spring:
  application:
    name: mcp-gateway
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/mcp_gateway?useUnicode=true&characterEncoding=utf8&serverTimezone=UTC}
    username: ${DB_USERNAME:mcp_gateway}
    password: ${DB_PASSWORD:mcp_gateway}
    driver-class-name: com.mysql.cj.jdbc.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration/common,classpath:db/migration/mysql
  jackson:
    default-property-inclusion: non_null

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    banner: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,flyway
  endpoint:
    health:
      show-details: never

server:
  port: ${SERVER_PORT:8080}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    try-it-out-enabled: true

app:
  security:
    jwt-secret: ${JWT_SECRET:change-this-development-secret-to-at-least-32-bytes}
    access-token-minutes: 15
    refresh-token-days: 7
    bootstrap-admin:
      username: ${BOOTSTRAP_ADMIN_USERNAME:admin}
      password: ${BOOTSTRAP_ADMIN_PASSWORD:Admin@123456}
    encryption-key: ${ENCRYPTION_KEY:change-this-encryption-key-32bytes!}

logging:
  file:
    name: ./logs/mcp-gateway.log
  pattern:
    level: "%5p [traceId=%X{traceId:-}]"
  logback:
    rollingpolicy:
      max-history: 3
      max-file-size: 50MB
